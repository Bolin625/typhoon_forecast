name: Typhoon Auto Forecast Pipeline

on: [push, workflow_dispatch]

jobs:
  forecast_and_update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        sudo apt-get update && sudo apt-get install -y libproj-dev proj-data proj-bin libgeos-dev
        pip install pandas matplotlib cartopy requests

    # 1. 執行 Python 腳本抓取真實數據並畫圖 (存到 output/ 目錄)
    - name: Run Typhoon Forecast Script
      run: python src/auto_forecast.py

    # 2. 📦 核心改動：直接把產出的圖片打包，上傳到 GitHub 的雲端成品區
    - name: Upload Typhoon Plot Artifact
      uses: actions/upload-artifact@v4
      with:
        name: latest-typhoon-plot
        path: output/latest_typhoon_track.png
        retention-days: 7